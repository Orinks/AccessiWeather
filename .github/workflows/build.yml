name: Build

on:
  schedule:
    - cron: "30 3 * * *"  # Nightly at 3:30 UTC
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip release creation'
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NUITKA_CACHE_DIR: ${{ github.workspace }}/.nuitka-cache

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version: ${{ steps.check.outputs.version }}
      is_nightly: ${{ steps.check.outputs.is_nightly }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ startsWith(github.ref, 'refs/tags/') && github.ref || 'dev' }}
          fetch-depth: 0

      - name: Check build conditions
        id: check
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Tagged release
            echo "is_nightly=false" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            # Manual nightly dispatches are intentional force-builds.
            echo "is_nightly=true" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "tag=nightly-$(date -u +%Y%m%d)" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            # Nightly build - check for changes
            echo "is_nightly=true" >> $GITHUB_OUTPUT
            echo "tag=nightly-$(date -u +%Y%m%d)" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT

            LAST_TAG=$(git tag --list "nightly-*" --sort=-version:refname | head -1)

            if [ -z "$LAST_TAG" ]; then
              # No prior nightly: build once
              echo "should_build=true" >> $GITHUB_OUTPUT
            else
              RANGE="$LAST_TAG"..HEAD

              # Build only when there is at least one user-facing file change.
              # This avoids shipping nightlies for docs/test/ci-only changes and
              # works even when squash merges or sync commits hide the original
              # commit subjects on first-parent history.
              USER_FACING_PATHS=$(git diff --name-only "$RANGE" -- \
                src/ \
                installer/ \
                scripts/generate_build_meta.py \
                pyproject.toml \
                accessiweather.spec \
                '*.spec' \
                soundpacks/ | sed '/^$/d')

              if [ -n "$USER_FACING_PATHS" ]; then
                echo "should_build=true" >> $GITHUB_OUTPUT
              else
                echo "should_build=false" >> $GITHUB_OUTPUT
              fi
            fi
          fi

  build-windows:
    name: Windows
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.is_nightly == 'true' && 'dev' || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - uses: actions/cache/restore@v5
        with:
          path: .nuitka-cache
          key: nuitka-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('pyproject.toml', 'installer/build_nuitka.py') }}-${{ github.run_id }}
          restore-keys: |
            nuitka-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('pyproject.toml', 'installer/build_nuitka.py') }}-
            nuitka-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: |
          pip install --only-binary wxPython wxPython
          pip install -e .[build]

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build
        timeout-minutes: 90
        run: |
          python scripts/generate_build_meta.py ${{ needs.prepare.outputs.is_nightly == 'true' && needs.prepare.outputs.tag || '' }}
          python installer/create_icons.py
          python installer/build_nuitka.py --tag "${{ needs.prepare.outputs.is_nightly == 'true' && needs.prepare.outputs.tag || '' }}"

      - uses: actions/upload-artifact@v7
        with:
          name: windows
          path: |
            dist/AccessiWeather_Setup_*.exe
            dist/AccessiWeather_Portable_*.zip

      - uses: actions/cache/save@v5
        if: always()
        with:
          path: .nuitka-cache
          key: nuitka-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('pyproject.toml', 'installer/build_nuitka.py') }}-${{ github.run_id }}

  build-macos:
    name: macOS
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.is_nightly == 'true' && 'dev' || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - uses: actions/cache/restore@v5
        with:
          path: .nuitka-cache
          key: nuitka-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('pyproject.toml', 'installer/build_nuitka.py') }}-${{ github.run_id }}
          restore-keys: |
            nuitka-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('pyproject.toml', 'installer/build_nuitka.py') }}-
            nuitka-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Install ccache
        run: brew install ccache

      - name: Install dependencies
        run: |
          pip install --only-binary wxPython wxPython
          pip install -e .[build]

      - name: Build
        timeout-minutes: 30
        run: |
          python scripts/generate_build_meta.py ${{ needs.prepare.outputs.is_nightly == 'true' && needs.prepare.outputs.tag || '' }}
          python installer/create_icons.py
          python installer/build_nuitka.py --tag "${{ needs.prepare.outputs.is_nightly == 'true' && needs.prepare.outputs.tag || '' }}"

      - uses: actions/upload-artifact@v7
        with:
          name: macos
          path: dist/AccessiWeather_macOS_*.zip

      - uses: actions/cache/save@v5
        if: always()
        with:
          path: .nuitka-cache
          key: nuitka-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('pyproject.toml', 'installer/build_nuitka.py') }}-${{ github.run_id }}

  release:
    name: Release
    needs: [prepare, build-windows, build-macos]
    if: always() && needs.prepare.outputs.should_build == 'true' && (needs.build-windows.result == 'success' || needs.build-macos.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.is_nightly == 'true' && 'dev' || github.ref }}
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
        continue-on-error: true

      - name: Prepare release
        id: prep
        env:
          IS_NIGHTLY: ${{ needs.prepare.outputs.is_nightly }}
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
          CLIFF_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          TIMESTAMP=$(date -u +%Y%m%d)

          # Rename assets based on release type
          for f in dist/*.exe dist/*.zip; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            if [ "$IS_NIGHTLY" = "true" ]; then
              case "$name" in
                *Setup*.exe) mv "$f" "assets/AccessiWeather-nightly-${TIMESTAMP}-windows-setup.exe" ;;
                *Portable*.zip) mv "$f" "assets/AccessiWeather-nightly-${TIMESTAMP}-windows-portable.zip" ;;
                *macOS*.zip) mv "$f" "assets/AccessiWeather-nightly-${TIMESTAMP}-macOS.zip" ;;
              esac
            else
              case "$name" in
                *Setup*.exe) mv "$f" "assets/AccessiWeather-${VERSION}-windows-setup.exe" ;;
                *Portable*.zip) mv "$f" "assets/AccessiWeather-${VERSION}-windows-portable.zip" ;;
                *macOS*.zip) mv "$f" "assets/AccessiWeather-${VERSION}-macOS.zip" ;;
              esac
            fi
          done

          # Generate checksums
          cd assets && sha256sum * > checksums.txt 2>/dev/null || true

          # Generate release notes via git-cliff (nightly and stable)
          cd ..
          if [ "$IS_NIGHTLY" = "true" ]; then
            LAST_TAG=$(git tag --list "nightly-*" --sort=-version:refname | head -1)
            if [ -n "$LAST_TAG" ]; then
              RANGE="$LAST_TAG"..HEAD
              ADDED=$(git log "$RANGE" --pretty='%s' --no-merges | \
                grep -Ei '^(feat|security)(\([^)]+\))?:' | \
                sed -E 's/^(feat|security)(\([^)]+\))?:[[:space:]]*//' || true)
              FIXED=$(git log "$RANGE" --pretty='%s' --no-merges | \
                grep -Ei '^fix(\([^)]+\))?:' | \
                grep -Eiv '^fix\((test|ci|build|chore|docs|style|refactor)\):' | \
                sed -E 's/^fix(\([^)]+\))?:[[:space:]]*//' || true)
              PERF=$(git log "$RANGE" --pretty='%s' --no-merges | \
                grep -Ei '^perf(\([^)]+\))?:' | \
                sed -E 's/^perf(\([^)]+\))?:[[:space:]]*//' || true)

              : > notes.md
              if [ -n "$ADDED" ]; then
                echo '## Added' >> notes.md
                printf '%s\n' "$ADDED" | awk 'NF && !seen[$0]++ {print "- "$0}' >> notes.md
              fi
              if [ -n "$FIXED" ]; then
                [ -s notes.md ] && echo >> notes.md
                echo '## Fixed' >> notes.md
                printf '%s\n' "$FIXED" | awk 'NF && !seen[$0]++ {print "- "$0}' >> notes.md
              fi
              if [ -n "$PERF" ]; then
                [ -s notes.md ] && echo >> notes.md
                echo '## Improved' >> notes.md
                printf '%s\n' "$PERF" | awk 'NF && !seen[$0]++ {print "- "$0}' >> notes.md
              fi

              [ -s notes.md ] || echo "- No user-facing changes" > notes.md
            else
              echo "Initial nightly build" > notes.md
            fi
          else
            npx git-cliff@latest --latest --ignore-tags "nightly-.*" --strip all > notes.md.tmp || true
            awk '!seen[$0]++' notes.md.tmp > notes.md && rm -f notes.md.tmp
            if [ ! -s notes.md ]; then
              echo "See [CHANGELOG.md](https://github.com/Orinks/AccessiWeather/blob/main/CHANGELOG.md) for full release notes." > notes.md
            fi
          fi

      - name: Create release
        if: ${{ inputs.dry_run != true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IS_NIGHTLY: ${{ needs.prepare.outputs.is_nightly }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          if [ "$IS_NIGHTLY" = "true" ]; then
            # Nightly: always recreate
            gh release delete "$TAG" -y --cleanup-tag 2>/dev/null || true
            gh release create "$TAG" assets/* --notes-file notes.md \
              --title "Nightly $(date -u +%Y-%m-%d)" --prerelease --target dev
          else
            # Stable: upload assets to existing release, or create new one
            if gh release view "$TAG" &>/dev/null; then
              # Release exists (created manually) — just upload assets
              gh release upload "$TAG" assets/* --clobber
            else
              gh release create "$TAG" assets/* --notes-file notes.md \
                --title "AccessiWeather v${VERSION}"
            fi
          fi

      - name: Trigger pages update
        if: ${{ inputs.dry_run != true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run update-pages.yml || true
