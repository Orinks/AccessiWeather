name: Nuitka Build

on:
  workflow_dispatch:
    inputs:
      build_tag:
        description: "Optional build tag, e.g. nightly-20260427"
        required: false
        type: string
      platform:
        description: "Platform to build"
        required: true
        default: macos
        type: choice
        options:
          - macos
          - windows
          - all

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NUITKA_CACHE_DIR: ${{ github.workspace }}/.nuitka-cache

jobs:
  build-windows:
    name: Windows
    if: ${{ inputs.platform == 'windows' || inputs.platform == 'all' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - uses: actions/cache@v4
        with:
          path: .nuitka-cache
          key: nuitka-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('pyproject.toml', 'installer/build_nuitka.py') }}-${{ github.run_id }}
          restore-keys: |
            nuitka-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('pyproject.toml', 'installer/build_nuitka.py') }}-
            nuitka-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-
          save-always: true

      - name: Install dependencies
        run: |
          pip install --only-binary wxPython wxPython
          pip install -e .[build]

      - name: Build with Nuitka
        run: |
          python scripts/generate_build_meta.py ${{ inputs.build_tag }}
          python installer/create_icons.py
          python installer/build_nuitka.py --tag "${{ inputs.build_tag }}"

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: nuitka-windows
          if-no-files-found: ignore
          path: |
            dist/AccessiWeather_dir/**
            dist/AccessiWeather_Portable_*.zip
            build/nuitka/compilation-report.xml
            nuitka-crash-report.xml
            build/nuitka/**/*.exe
            dist/version.txt

  build-macos:
    name: macOS
    if: ${{ inputs.platform == 'macos' || inputs.platform == 'all' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - uses: actions/cache@v4
        with:
          path: .nuitka-cache
          key: nuitka-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('pyproject.toml', 'installer/build_nuitka.py') }}-${{ github.run_id }}
          restore-keys: |
            nuitka-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('pyproject.toml', 'installer/build_nuitka.py') }}-
            nuitka-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-
          save-always: true

      - name: Install ccache
        run: brew install ccache

      - name: Install dependencies
        run: |
          pip install --only-binary wxPython wxPython
          pip install -e .[build]

      - name: Build with Nuitka
        run: |
          python scripts/generate_build_meta.py ${{ inputs.build_tag }}
          python installer/create_icons.py
          python installer/build_nuitka.py --tag "${{ inputs.build_tag }}"

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: nuitka-macos
          if-no-files-found: ignore
          path: |
            dist/AccessiWeather_macOS_*.zip
            build/nuitka/compilation-report.xml
            nuitka-crash-report.xml
            build/nuitka/**/*.app/**
            dist/version.txt
