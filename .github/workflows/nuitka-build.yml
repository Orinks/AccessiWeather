name: Nuitka Build

on:
  workflow_dispatch:
    inputs:
      build_tag:
        description: "Optional build tag, e.g. nightly-20260427"
        required: false
        type: string
      platform:
        description: "Platform to build"
        required: true
        default: macos
        type: choice
        options:
          - macos
          - windows
          - all

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  build-windows:
    name: Windows
    if: ${{ inputs.platform == 'windows' || inputs.platform == 'all' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --only-binary wxPython wxPython
          pip install -e .[build]

      - name: Build with Nuitka
        run: |
          python scripts/generate_build_meta.py ${{ inputs.build_tag }}
          python installer/create_icons.py
          python installer/build_nuitka.py --tag "${{ inputs.build_tag }}"

      - uses: actions/upload-artifact@v7
        with:
          name: nuitka-windows
          path: |
            dist/AccessiWeather_dir/**
            dist/AccessiWeather_Portable_*.zip
            build/nuitka/**/*.exe
            dist/version.txt

  build-macos:
    name: macOS
    if: ${{ inputs.platform == 'macos' || inputs.platform == 'all' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --only-binary wxPython wxPython
          pip install -e .[build]

      - name: Build with Nuitka
        run: |
          python scripts/generate_build_meta.py ${{ inputs.build_tag }}
          python installer/create_icons.py
          python installer/build_nuitka.py --tag "${{ inputs.build_tag }}"

      - uses: actions/upload-artifact@v7
        with:
          name: nuitka-macos
          path: |
            dist/AccessiWeather_macOS_*.zip
            build/nuitka/**/*.app/**
            dist/version.txt
