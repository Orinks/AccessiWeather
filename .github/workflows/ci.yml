name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

env:
  FORCE_COLOR: "1"

jobs:
  validate:
    name: Validate (Ubuntu, Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.12"
            primary: true
          - python-version: "3.13"
            primary: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: ${{ matrix.primary && 0 || 1 }}

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip

    - name: Install system dependencies (wxPython runtime + xvfb for headless)
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: >-
          libgtk-3-dev libnotify-dev libsdl2-dev libwebkit2gtk-4.1-dev
          freeglut3-dev xvfb
        version: 1.0

    - name: Ruff format check
      if: matrix.primary
      uses: astral-sh/ruff-action@v3
      with:
        args: format --check

    - name: Ruff lint
      if: matrix.primary
      uses: astral-sh/ruff-action@v3
      with:
        args: check

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Use prebuilt wx wheels only — never build from source.
        # extras.wxpython.org provides Linux wheels for supported Python versions.
        pip install \
          -f https://extras.wxpython.org/wxPython4/extras/linux/gtk3/ubuntu-24.04 \
          --only-binary wxPython \
          wxPython
        pip install -r requirements-dev.txt
        pip install -e .

    - name: Check CHANGELOG reminder
      if: matrix.primary && (github.ref == 'refs/heads/dev' || github.base_ref == 'dev')
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE="origin/${{ github.base_ref }}"
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}:${BASE}" || true
          echo "PR detected - comparing against $BASE"
        else
          LAST_NIGHTLY=$(git tag --list "nightly-*" --sort=-version:refname | head -n 1)
          BASE="${LAST_NIGHTLY:-HEAD~1}"
          echo "Push detected - comparing against $BASE"
        fi

        if ! CHANGED_FILES=$(git diff --name-only "$BASE"..HEAD 2>/dev/null); then
          echo "Could not determine changed files for CHANGELOG reminder. Skipping."
          exit 0
        fi

        SRC_CHANGED=$(echo "$CHANGED_FILES" | grep -E "^src/" || true)
        CHANGELOG_CHANGED=$(echo "$CHANGED_FILES" | grep -E "^CHANGELOG\.md$" || true)

        if [ -n "$SRC_CHANGED" ] && [ -z "$CHANGELOG_CHANGED" ]; then
          {
            echo "### CHANGELOG reminder"
            echo
            echo "Source files changed without a matching \`CHANGELOG.md\` update."
            echo "Add the user-facing note under \`## Unreleased\` when the change should appear in nightly release notes."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::warning::Source files changed but CHANGELOG.md was not updated."
        elif [ -n "$SRC_CHANGED" ]; then
          echo "CHANGELOG.md updated alongside src/ changes."
        else
          echo "No src/ changes detected."
        fi

    - name: Run tests (headless via xvfb)
      env:
        PYTHONPATH: src
        ACCESSIWEATHER_TEST_MODE: "1"
        HYPOTHESIS_PROFILE: ci
      run: |
        if [ "${{ matrix.primary }}" = "true" ]; then
          mkdir -p reports
          xvfb-run -a pytest tests/ -n auto -v --tb=short -m "not integration" \
            --cov=src/accessiweather \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=term-missing
        else
          xvfb-run -a pytest tests/ -n auto -v --tb=short -m "not integration"
        fi

    - name: Install diff-cover
      if: matrix.primary && github.event_name == 'pull_request'
      run: pip install diff-cover>=9.0.0

    - name: Coverage gate
      if: matrix.primary && github.event_name == 'pull_request'
      run: |
        BASE="origin/${{ github.base_ref }}"
        CHANGED_SRC=$(git diff --name-only "$BASE"..HEAD | grep '^src/' || true)
        NON_EXCLUDED_CHANGED=$(echo "$CHANGED_SRC" | grep -Ev '^src/accessiweather/ui/|^src/accessiweather/notifications/toast_notifier.py$|^src/weather_gov_api_client/' || true)

        if [ -z "$NON_EXCLUDED_CHANGED" ]; then
          echo "No non-excluded src/ changes to gate. Skipping diff coverage gate."
          exit 0
        fi

        diff-cover reports/coverage.xml \
          --compare-branch="$BASE" \
          --fail-under=80 \
          --diff-range-notation='..' \
          --exclude '*/accessiweather/ui/*'
        echo "New code meets coverage threshold."
