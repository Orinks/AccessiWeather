[settings]
profile = black
line_length = 100
multi_line_output = 3
include_trailing_comma = True
force_grid_wrap = 0
use_parentheses = True
ensure_newline_before_comments = True
skip = .git,__pycache__,build,dist,docs,*.md,LICENSE,CHANGELOG.md,README.md,CONTRIBUTING.md,INSTALL.md,RELEASE_README.md,BETA_RELEASE.md,enhanced_release_notes.md,release_notes.md,knowledge.md
